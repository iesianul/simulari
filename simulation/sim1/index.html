<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01//EN""http://www.w3.org/TR/html4/strict.dtd">
<html>
<head>
	<title>Hello</title>
	<meta http-equiv="Content-Type"  content="text/html charset=UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="cache-control" content="max-age=0" />
	<meta http-equiv="cache-control" content="no-cache" />
	<meta http-equiv="expires" content="0" />
	<meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
	<meta http-equiv="pragma" content="no-cache" />
	<link rel="stylesheet" href="https://storage.googleapis.com/code.getmdl.io/1.0.6/material.indigo-pink.min.css">
	<script src="https://storage.googleapis.com/code.getmdl.io/1.0.6/material.min.js"></script>
	<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
	<link rel="stylesheet" type="text/css" href="css/tooltipster.css">
	<link rel="stylesheet" type="text/css" href="css/alertify.css">
	<link rel="stylesheet" type="text/css" href="css/experiment.css">
</head>
<body>
	<div class="mdl-layout mdl-js-layout mdl-layout--fixed-header">
	  <header class="mdl-layout__header">
	    <div class="mdl-layout__header-row">
	      <!-- Title -->
	      <span class="mdl-layout-title">Măsurarea vitezei sunetului</span>
	      <!-- Add spacer, to align navigation to the right -->
	      <div class="mdl-layout-spacer"></div>
	      <!-- Navigation. We hide it in small screens. -->	      
	    </div>
	  </header>
	  <main class="mdl-layout__content">
	    <div class="page-content">
	    	<!-- begin content-->
	    	<div class="mdl-tabs mdl-js-tabs mdl-js-ripple-effect">
				<div class="mdl-tabs__tab-bar">
					<a href="#experiment-panel" class="mdl-tabs__tab is-active">Experiment</a>
					<a href="#teorie-panel" class="mdl-tabs__tab">Theory</a>
					<a href="#about-panel" class="mdl-tabs__tab">About</a>
				</div>
				<div class="mdl-tabs__panel is-active" id="experiment-panel">
					<div class="mdl-grid">
						<div class="centerContainer">
							<div class="holder">
								<div class="ecran_osciloscop">
									<canvas id="displayOsciloscop" width="235" height="175"></canvas>
								</div>
								<div class="ecran_generator">
									<canvas id="displayGenerator" width="177" height="119"></canvas>
								</div>
								<div class="ecran_wave">
									<canvas id="displayWave" width="260" height="60"></canvas>
								</div>
								<div class="power_osc">
									<input id="osciloscopeSwitch" class="tooltip" title="Power On/Off" type="image" src="imagini/btn_off.png" value="0">
								</div>
								<div class="power_gen">
									<input id="generatorSwitch" class="tooltip" title="Power On/Off" type="image" src="imagini/btn_off.png" value="0">
								</div>
								<div class="dataShow">
								</div>
								<img src="imagini/montaj.png">
								<div class="ampDragContainer">
									<img id="amp_drag" class="draggable tooltip" title="Drag to adjust amplitude" src="imagini/amp_slider.png">
								</div>
								<div class="frecvDragContainer">
									<img id="frecv_drag" class="draggable tooltip" title="Drag to adjust frequency" src="imagini/amp_slider.png">
								</div>
								<div id="microDragContainerId" class="microDragContainer">
									<img id="micro_drag" class="draggable tooltip" title="Use mouse or arrow keys to move the microphone" src="imagini/micro.png">
								</div>
							</div>
						</div>
				    </div>
				</div>
				<div class="mdl-tabs__panel" id="teorie-panel">
				    Teorie
				</div>
				<div class="mdl-tabs__panel" id="about-panel">
				    Despre aplicație
				</div>
	    	</div>
	    	<!-- end content -->
	    </div>
	  </main>
	</div>
	<script data-main="js/app" src="js/lib/require.js"></script>
</body>
</html>
